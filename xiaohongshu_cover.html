<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1080px;
    height: 1440px;
    background: linear-gradient(180deg, #006994 0%, #004d6b 50%, #001a2e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    position: relative;
    overflow: hidden;
}
.bubbles {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}
.bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
}
.content {
    z-index: 10;
    text-align: center;
    color: white;
}
.icon { font-size: 80px; margin-bottom: 30px; }
.title { font-size: 72px; font-weight: bold; margin-bottom: 30px; }
.subtitle { font-size: 48px; color: #00d4ff; margin-bottom: 50px; }
.line {
    width: 400px;
    height: 4px;
    background: #00d4ff;
    margin: 0 auto 50px;
}
.features { margin-bottom: 80px; }
.feature { font-size: 36px; margin: 20px 0; }
.tags { font-size: 28px; color: rgba(255,255,255,0.8); margin-bottom: 20px; }
.badge {
    background: #ff2442;
    padding: 15px 50px;
    border-radius: 8px;
    font-size: 32px;
    font-weight: bold;
}
</style>
</head>
<body>
<div class="bubbles" id="bubbles"></div>
<div class="content">
    <div class="icon">🤿</div>
    <div class="title">潜水装备避雷指南</div>
    <div class="subtitle">哪些该买？哪些千万别买？</div>
    <div class="line"></div>
    <div class="features">
        <div class="feature">✓ 面镜选购攻略</div>
        <div class="feature">✓ 电脑表避坑指南</div>
        <div class="feature">✓ 湿衣省钱秘籍</div>
    </div>
    <div class="tags">#潜水装备 #潜水入门</div>
    <div class="tags">50次潜水经验分享</div>
    <div class="badge">小红书</div>
</div>
<script>
const bubbles = document.getElementById('bubbles');
for(let i=0; i<30; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.style.left = Math.random()*100 + '%';
    b.style.top = Math.random()*100 + '%';
    b.style.width = b.style.height = (Math.random()*30+10) + 'px';
    b.style.opacity = Math.random()*0.3+0.1;
    bubbles.appendChild(b);
}
</script>
</body>
</html>
